name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Check formatting
        run: test -z "$(gofmt -l .)"

      - name: Download modules
        run: go mod download

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck UI
        run: npm run ui:check

      - name: Build UI
        run: npm run ui:build

      - name: Check generated UI
        run: git diff --exit-code -- internal/server/static

      - name: Test
        run: go test ./...

      - name: Test shell scripts
        run: make test-shell

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Lint Go
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2

      - name: Lint UI
        run: npm run ui:lint
