[Interface]
PrivateKey = server-private-key
Address = 10.8.0.1/24
ListenPort = 51820
MTU = 1420
PreUp = 
PostUp = iptables -t nat -C POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE || iptables -t nat -I POSTROUTING 1 -s 10.8.0.0/24 -o eth0 -j MASQUERADE; iptables -C INPUT -p udp -m udp --dport 51820 -j ACCEPT || iptables -I INPUT 1 -p udp -m udp --dport 51820 -j ACCEPT; iptables -C FORWARD -i awg0 -j ACCEPT || iptables -I FORWARD 1 -i awg0 -j ACCEPT; iptables -C FORWARD -o awg0 -j ACCEPT || iptables -I FORWARD 1 -o awg0 -j ACCEPT;
PreDown = 
PostDown = while iptables -t nat -C POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE; do iptables -t nat -D POSTROUTING -s 10.8.0.0/24 -o eth0 -j MASQUERADE; done; while iptables -C INPUT -p udp -m udp --dport 51820 -j ACCEPT; do iptables -D INPUT -p udp -m udp --dport 51820 -j ACCEPT; done; while iptables -C FORWARD -i awg0 -j ACCEPT; do iptables -D FORWARD -i awg0 -j ACCEPT; done; while iptables -C FORWARD -o awg0 -j ACCEPT; do iptables -D FORWARD -o awg0 -j ACCEPT; done;
Jc = 4
Jmin = 64
Jmax = 1024
S1 = 0
S2 = 0
H1 = 1111111111
H2 = 2222222222
H3 = 3333333333
H4 = 444444444

[Peer]
PublicKey = client-public-key
PresharedKey = client-preshared-key
AllowedIPs = 10.8.0.2/32
